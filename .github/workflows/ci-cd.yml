# ─────────────────────────────────────────────────────────────────────────────
# TaskFlow API — GitHub Actions CI/CD Pipeline
# Triggers: push & PR to main/develop
# Stages:  lint → test → build → docker → deploy (staging)
# ─────────────────────────────────────────────────────────────────────────────

name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "20"
  IMAGE_NAME: taskflow-api

jobs:
  # ═══════════════════════════════════════════════════════════════════════════
  # JOB 1 — Lint & Static Analysis
  # ═══════════════════════════════════════════════════════════════════════════
  lint:
    name: "🔍 Lint & Static Analysis"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  # ═══════════════════════════════════════════════════════════════════════════
  # JOB 2 — Automated Tests with Coverage
  # ═══════════════════════════════════════════════════════════════════════════
  test:
    name: "🧪 Run Tests & Coverage"
    runs-on: ubuntu-latest
    needs: lint

    strategy:
      matrix:
        node-version: ["18", "20"]   # Test on multiple Node versions

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm run test:ci

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-node${{ matrix.node-version }}
          path: coverage/
          retention-days: 7

      - name: Upload JUnit test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-node${{ matrix.node-version }}
          path: junit.xml
          retention-days: 7

  # ═══════════════════════════════════════════════════════════════════════════
  # JOB 3 — Build & Package
  # ═══════════════════════════════════════════════════════════════════════════
  build:
    name: "🔨 Build Application"
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install production dependencies
        run: npm ci --only=production

      - name: Verify application starts
        run: |
          node src/app.js &
          APP_PID=$!
          sleep 3
          curl -f http://localhost:3000/health || (kill $APP_PID && exit 1)
          kill $APP_PID
          echo "✅ Application started and health check passed"

  # ═══════════════════════════════════════════════════════════════════════════
  # JOB 4 — Docker Build & Push
  # ═══════════════════════════════════════════════════════════════════════════
  docker:
    name: "🐳 Docker Build & Push"
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          target: production
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image vulnerability scan (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:latest
          format: "table"
          exit-code: "0"           # warn but don't fail
          severity: "CRITICAL,HIGH"

  deploy-staging:
    name: "🚀 Deploy to Render"
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/main'
  
    steps:
      - name: Trigger Render Deploy
        run: |
          echo "Triggering Render deployment..."
          curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK }}
  
      - name: Notify deployment status
        run: |
          echo "✅ Render deployment triggered"
          echo "Commit: ${{ github.sha }}"
